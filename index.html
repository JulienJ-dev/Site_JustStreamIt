<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustStreamIt</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="banner">
        <img src="Ressources/Logo_JustStreamIt.svg" alt="Logo JustStreamIt">
        <p>Vidéos à la demande</p>
    </header>

    <main>
        <section class="best-movie">
            <h2>Meilleur film</h2>
            <div class="best-movie-container">
                <article class="best-movie-card"></article>
            </div>
        </section>

        <section>
            <h2>Les mieux notés</h2>
            <div class="grid-container top-rated-grid"></div>
            <button class="see-more-button" type="button">Voir plus</button>
        </section>

        <section>
            <h2>Mystery</h2>
            <div class="grid-container mystery-grid"></div>
        </section>

        <section>
            <h2>Western</h2>
            <div class="grid-container western-grid"></div>
        </section>

        <section>
            <h2>Autres catégories</h2>

            <select id="category-select">
                <option value="action">Action</option>
                <option value="comedy">Comedy</option>
                <option value="family">Family</option>
                <option value="fantasy">Fantasy</option>
                <option value="horror">Horror</option>
                <option value="sci-fi">Science-fiction</option>
            </select>

            <div class="grid-container category-grid"></div>
        </section>
    </main>

    <div id="movie-modal" class="modal"></div>

    <script src="script.js"></script>

</body>

</html>
